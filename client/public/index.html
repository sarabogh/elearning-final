<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="eLearning Management System"
    />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>eLearning Platform</title>
    <script>
      (function () {
        var redirect = window.location.search.match(/^[?]\/([^&]+)/);
        if (!redirect) return;

        var decodedPath = redirect[1].replace(/~and~/g, '&');
        var newUrl = window.location.pathname + decodedPath + window.location.hash;
        window.history.replaceState(null, '', newUrl);
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
